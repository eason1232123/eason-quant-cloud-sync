name: Eason Quant Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 1-5"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build market report
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python scripts/build_report.py

      - name: Commit updated reports
        run: |
          git config user.name "eason-quant-bot"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "Update daily quant report" || echo "No changes to commit"
          git push
