name: Eason Quant Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 1-5"

concurrency:
  group: eason-quant-daily-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build market report cache-safe append-only
        timeout-minutes: 8
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
          MAX_TIINGO_REQUESTS_PER_RUN: "4"
          MAX_NEW_FULL_DOWNLOADS_PER_RUN: "1"
          TIINGO_REQUEST_SLEEP_SECONDS: "1.5"
        run: python -u scripts/build_report_safe.py

      - name: Build ChatGPT light summary
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_latest_summary.py

      - name: Build final ChatGPT signal
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_eason_signal.py

      - name: Build vectorbt validation
        timeout-minutes: 6
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_vectorbt_validation.py

      - name: Build vectorbt evidence layer
        timeout-minutes: 6
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_vectorbt_backtest.py

      - name: Build portfolio backtest
        timeout-minutes: 6
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_portfolio_backtest.py

      - name: Build walk-forward and overfitting reports
        timeout-minutes: 6
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_walk_forward_report.py

      - name: Build trade review
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_trade_review.py

      - name: Build v3 master action board
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_action_board_v3.py

      - name: Commit updated reports
        run: |
          git config user.name "eason-quant-bot"
          git config user.email "actions@github.com"
          git add docs/*.json docs/*.csv docs/*.html
          git commit -m "Update daily quant report" || echo "No changes to commit"
          git push
