name: Eason Quant Daily

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/main.yml"
      - "scripts/**"
      - "config.py"
      - "config/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "schemas/**"
      - "tests/**"
      - "docs/**"
      - "README.md"
      - "THREE_TIER_UNIVERSE.md"
  schedule:
    - cron: "30 23 * * 1-5"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/main.yml"
      - "scripts/**"
      - "config.py"
      - "config/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "schemas/**"
      - "tests/**"
      - "README.md"
      - "THREE_TIER_UNIVERSE.md"

concurrency:
  group: eason-quant-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-smoke-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Validate committed generated artifacts before rebuild
        run: |
          python -m scripts.validate_generated_json
          python -m scripts.validate_decision_packet
          python -m scripts.validate_market_universe
          python -m scripts.validate_model_artifacts

      - name: Compile Python sources
        run: python -m compileall -q scripts tests config.py

      - name: Validate frozen train-validation-test split
        run: python -m scripts.validate_validation_split

      - name: Run decision contract tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build broad US market universe
        timeout-minutes: 3
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_market_universe.py

      - name: Build dynamic candidate ranking from repository caches
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_dynamic_candidates.py

      - name: Build v5 decision contract from repository caches
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u scripts/build_decision_report.py
          python -u scripts/build_action_board_v3.py

      - name: Verify expected outputs
        run: |
          test -s docs/market_universe.csv
          test -s docs/market_universe_summary.json
          test -s docs/dynamic_candidates.csv
          test -s docs/dynamic_candidates.json
          test -s docs/promotion_queue.csv
          test -s docs/promotion_queue.json
          test -s docs/decision_packet.json
          python -m scripts.validate_market_universe
          python -m scripts.validate_decision_packet
          python -m scripts.validate_generated_json
          python - <<'PY'
          import json
          from pathlib import Path


          universe = json.loads(Path('docs/market_universe_summary.json').read_text())
          candidates = json.loads(Path('docs/dynamic_candidates.json').read_text())
          promotion = json.loads(Path('docs/promotion_queue.json').read_text())
          assert candidates['version'] == 'dynamic-candidates-v3-freshness-gates', candidates['version']
          assert candidates['coverage']['configured_core_count'] == 94, candidates['coverage']
          reference_status = candidates['promotion_gates']['reference_status']
          assert reference_status in {
              'ALIGNED',
              'REPORTED_EXPECTED_DATE_MISSING',
              'REPORTED_EXPECTED_DATE_MISMATCH',
          }, candidates['promotion_gates']
          metadata_status = candidates['promotion_gates']['market_data_metadata_status']
          assert metadata_status in {'COMPLETE', 'MISSING_OR_INVALID'}, candidates['promotion_gates']
          context_eligible = reference_status == 'ALIGNED' and metadata_status == 'COMPLETE'
          if context_eligible:
              assert candidates['coverage']['cached_tickers_scored'] <= candidates['coverage']['fresh_ticker_count'], candidates['coverage']
              if candidates['coverage']['fresh_ticker_count'] == 0:
                  assert candidates['coverage']['cached_tickers_scored'] == 0, candidates['coverage']
                  assert candidates['top_candidates'] == [], candidates['top_candidates']
          else:
              assert candidates['coverage']['cached_tickers_scored'] == 0, candidates['coverage']
              assert candidates['coverage']['dynamic_candidate_count'] == 0, candidates['coverage']
              assert candidates['coverage']['promotion_queue_count'] == 0, candidates['coverage']
              assert candidates['top_candidates'] == [], candidates['top_candidates']
              assert candidates['promotion_queue'] == [], candidates['promotion_queue']
          assert candidates['coverage']['deep_pool_count'] >= 94, candidates['coverage']
          assert promotion['count'] == candidates['coverage']['promotion_queue_count']
          if not context_eligible:
              assert promotion['count'] == 0, promotion
              assert promotion['candidates'] == [], promotion
          for row in promotion['candidates']:
              assert row['promotion_eligible'] is True, row
              assert row['data_fresh'] is True, row
              assert row['is_core_94'] is False, row
              assert row['gate_reasons'] == [], row
          print({'universe': universe['eligible_ticker_count'], **candidates['coverage']})
          PY

  build-report:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall -q scripts tests config.py

      - name: Run decision contract tests before market-data requests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Validate frozen train-validation-test split
        run: python -m scripts.validate_validation_split

      - name: Build broad US market universe
        timeout-minutes: 3
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_market_universe.py

      - name: Validate complete market universe
        run: python -m scripts.validate_market_universe

      - name: Build market report tiered cache-safe append-only
        timeout-minutes: 35
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
          HYDRATION_RUN_NOTE: "2026-07-10-coverage-gaps-first-attempt-2"
          MAX_TIINGO_REQUESTS_PER_RUN: "50"
          MAX_NEW_FULL_DOWNLOADS_PER_RUN: "40"
          TIINGO_REQUEST_SLEEP_SECONDS: "5.0"
        run: python -u scripts/build_report_safe.py

      - name: Build dynamic candidate ranking and promotion queue
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_dynamic_candidates.py

      - name: Build ChatGPT market summary text
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_latest_summary.py

      - name: Build vectorbt validation
        timeout-minutes: 8
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
          NUMBA_DISABLE_JIT: "1"
        run: python -u scripts/build_vectorbt_validation.py

      - name: Build vectorbt evidence layer
        timeout-minutes: 8
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
          NUMBA_DISABLE_JIT: "1"
        run: python -u scripts/build_vectorbt_backtest.py

      - name: Build portfolio backtest
        timeout-minutes: 8
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_portfolio_backtest.py

      - name: Build walk-forward and overfitting reports
        timeout-minutes: 8
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_walk_forward_report.py

      - name: Build trade review
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_trade_review.py

      - name: Build decision report
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_decision_report.py

      - name: Record immutable prospective model-candidate ledger
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_model_candidate_ledger.py

      - name: Build v3 master action board
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_action_board_v3.py

      - name: Record immutable prospective signal ledger
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_forward_ledger.py

      - name: Mature sanitized live-review forward outcomes
        timeout-minutes: 4
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_live_review_forward_ledger.py update-outcomes

      - name: Validate final decision packet contract
        timeout-minutes: 2
        run: |
          test -s docs/decision_packet.json
          test -s docs/forward_validation_status.json
          test -s docs/model_governance.json
          test -e docs/model_candidate_forward_ledger.jsonl
          test -s docs/live_review_forward_status.json
          test -e docs/live_review_forward_ledger.jsonl
          test -s schemas/decision_packet.schema.json
          python -m scripts.validate_decision_packet
          python -m scripts.validate_validation_split
          python -m scripts.validate_model_artifacts
          python -m scripts.validate_generated_json

      - name: Audit v6 human-pilot release readiness
        timeout-minutes: 3
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u scripts/audit_v6_release.py
          test -s docs/v6_release_status.json
          python -m scripts.validate_generated_json

      - name: Enforce operational market-data health before publication
        timeout-minutes: 2
        run: python -m scripts.validate_operational_health

      - name: Commit updated reports
        run: |
          git config user.name "eason-quant-bot"
          git config user.email "actions@github.com"
          git add docs/*.json docs/*.jsonl docs/*.csv docs/*.html docs/*.txt
          if git diff --cached --quiet; then
            echo "No report changes to commit"
          else
            git commit -m "Update daily quant report"
            git push
          fi
