name: Eason Quant Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 1-5"

concurrency:
  group: eason-quant-daily-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build market report
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
          MAX_TIINGO_REQUESTS_PER_RUN: "35"
          MAX_NEW_FULL_DOWNLOADS_PER_RUN: "8"
        run: python scripts/build_report.py

      - name: Build ChatGPT light summary
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/build_latest_summary.py

      - name: Build final ChatGPT signal
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/build_eason_signal.py

      - name: Commit updated reports
        run: |
          git config user.name "eason-quant-bot"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "Update daily quant report" || echo "No changes to commit"
          git push
