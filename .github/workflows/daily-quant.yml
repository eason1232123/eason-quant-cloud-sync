name: Eason Quant Daily

on:
  workflow_dispatch:
  schedule:
    # Runs after the regular U.S. close, away from the top of the hour to reduce GitHub schedule congestion.
    - cron: "29 22 * * 1-5"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build market report
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          MAX_TIINGO_REQUESTS_PER_RUN: "35"
          MAX_NEW_FULL_DOWNLOADS_PER_RUN: "8"
          TIINGO_REQUEST_SLEEP_SECONDS: "0.9"
        run: python scripts/build_report.py

      - name: Build decision report
        run: python scripts/build_decision_report.py

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.json docs/*.csv
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update daily quant reports"
            git push
          fi
