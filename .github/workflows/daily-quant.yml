name: Eason Quant Daily

on:
  workflow_dispatch:
  schedule:
    # Runs after the regular U.S. close, away from the top of the hour to reduce GitHub schedule congestion.
    - cron: "29 22 * * 1-5"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build market report cache-safe append-only
        timeout-minutes: 8
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          PYTHONUNBUFFERED: "1"
          MAX_TIINGO_REQUESTS_PER_RUN: "4"
          MAX_NEW_FULL_DOWNLOADS_PER_RUN: "1"
          TIINGO_REQUEST_SLEEP_SECONDS: "1.5"
        run: python -u scripts/build_report_safe.py

      - name: Build vectorbt validation
        timeout-minutes: 6
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_vectorbt_validation.py

      - name: Build vectorbt evidence layer
        timeout-minutes: 6
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_vectorbt_backtest.py

      - name: Build portfolio backtest
        timeout-minutes: 6
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_portfolio_backtest.py

      - name: Build walk-forward and overfitting reports
        timeout-minutes: 6
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_walk_forward_report.py

      - name: Build trade review
        timeout-minutes: 4
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_trade_review.py

      - name: Build decision report
        timeout-minutes: 4
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_decision_report.py

      - name: Build v3 master action board
        timeout-minutes: 4
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u scripts/build_action_board_v3.py

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.json docs/*.csv
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update daily quant reports"
            git push
          fi
